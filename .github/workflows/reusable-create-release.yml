name: Reusable Create GitHub Release

on:
  workflow_call:
    inputs:
      changelog-path:
        description: CHANGELOG 檔案路徑（相對於專案根目錄）。
        required: false
        type: string
        default: 'CHANGELOG.md'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Release Notes from CHANGELOG
        id: extract
        run: |
          VERSION="${{ github.ref_name }}"
          CHANGELOG="${{ inputs.changelog-path }}"
          # 將版號中的 . 加上脫逸字元，供正規表示式使用
          ESCAPED_VERSION=$(echo "$VERSION" | sed 's/\./\\./g')

          # 檢查 CHANGELOG 檔案是否存在
          if [ ! -f "$CHANGELOG" ]; then
            echo "use_generate_notes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 1. 支援 \r 容錯避免 Windows 換行符號干擾
          # 2. sed 's/^#//' 拔除開頭第一個 #，將標題全體升一級
          NOTES=$(awk "/^## ${ESCAPED_VERSION}( |\r?\$)/{found=1} found && /^## / && !/^## ${ESCAPED_VERSION}/{exit} found{print}" "$CHANGELOG" \
            | sed 's/^#//')

          # 剔除字串中的空白與換行後，嚴格檢查是否真的有內容
          if [ -z "$(echo "$NOTES" | tr -d ' \n\r')" ]; then
            echo "use_generate_notes=true" >> $GITHUB_OUTPUT
          else
            # 使用 printf 安全寫入多行字串
            printf "%s\n" "$NOTES" > /tmp/release_notes.md
            echo "use_generate_notes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          
          if [ "${{ steps.extract.outputs.use_generate_notes }}" = "true" ]; then
            echo "⚠️ CHANGELOG 中找不到 ${VERSION} 的區段，改用自動產生的 Release Notes"
            gh release create "$VERSION" --title "$VERSION" --generate-notes
          else
            echo "✅ 成功從 CHANGELOG 提取 ${VERSION} 區段內容"
            gh release create "$VERSION" --title "$VERSION" --notes-file /tmp/release_notes.md
          fi
          